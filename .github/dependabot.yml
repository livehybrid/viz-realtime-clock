version: 2
updates:
  # Build tooling for the analog_clock visualization bundle
  - package-ecosystem: "npm"
    directory: "/appserver/static/visualizations/analog_clock"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "javascript"

  # GitHub Actions used by the CI/release workflow
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
