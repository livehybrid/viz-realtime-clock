[realtime_clock]
label = Realtime Clock
description = Real-time analog clock with aviation-themed dark aesthetic. Runs at 60 fps via requestAnimationFrame. Built for AirspaceWatch.
framework_type = studio_visualization
search_fragment = | makeresults | eval _time=now() | table _time
default_height = 300
allow_user_selection = true
disabled = false

[realtime_clock.handColor]
label = Hand Color
fieldType = color
defaultValue = #6aa3f8

[realtime_clock.secondHandColor]
label = Second Hand Color
fieldType = color
defaultValue = #00d4aa

[realtime_clock.tickColor]
label = Tick Color
fieldType = color
defaultValue = #00d4aa

[realtime_clock.showDigital]
label = Show Digital Time
fieldType = radio
defaultValue = 1

[realtime_clock.showDate]
label = Show Date
fieldType = radio
defaultValue = 1

[realtime_clock.showGlow]
label = Glow Effect
fieldType = radio
defaultValue = 1

[realtime_clock.timezone]
label = Timezone
fieldType = dropdown
defaultValue = utc
allowStrings = true

[digital_clock]
label = Digital Clock
description = Seven-segment LCD-style digital clock with blinking colon, 12/24-hour modes, timezone support and phosphor glow.
framework_type = studio_visualization
search_fragment = | makeresults | eval _time=now() | table _time
default_height = 180
allow_user_selection = true
disabled = false

[digital_clock.color]
label = Digit Color
fieldType = color
defaultValue = #00d4aa

[digital_clock.background]
label = Background
fieldType = color
defaultValue = #050810

[digital_clock.timezone]
label = Timezone
fieldType = dropdown
defaultValue = local
allowStrings = true

[digital_clock.hour24]
label = 24-hour time
fieldType = radio
defaultValue = 1

[digital_clock.showSeconds]
label = Show Seconds
fieldType = radio
defaultValue = 1

[digital_clock.showDate]
label = Show Date
fieldType = radio
defaultValue = 1

[digital_clock.showGlow]
label = Glow Effect
fieldType = radio
defaultValue = 1

[digital_clock.blinkColon]
label = Blink Colon
fieldType = radio
defaultValue = 1

[digital_clock.ghostSegments]
label = Ghost Segments
fieldType = radio
defaultValue = 1
